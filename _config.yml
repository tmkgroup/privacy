title: TMK Group — Privacy
description: Privacy policies for the apps published by TMK Group.
url: https://privacy.tmkgroup.vn
baseurl: ""

# Single layout default for plain pages. Per-app metadata lives in each
# app's own index.md frontmatter — see _TEMPLATE_app/index.md for the
# canonical shape. This keeps the config flat regardless of how many
# apps the repo grows to host.
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default

# GitHub Pages-safe Jekyll only. No custom plugins.
markdown: kramdown
kramdown:
  input: GFM

# Don't ship the templates / dev files in the published site.
exclude:
  - "_TEMPLATE_app"
  - README.md
  - .github
